<svg width="128" height="128" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="grad_BAL" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#3D348B;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#FE5B65;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow_BAL" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
          <feOffset dx="0" dy="2" result="offsetblur"/>
          <feFlood flood-color="#000000" flood-opacity="0.3"/>
          <feComposite in2="offsetblur" operator="in"/>
          <feMerge>
            <feMergeNode/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- Background circle with gradient -->
      <circle cx="64" cy="64" r="62"
              fill="url(#grad_BAL)"
              filter="url(#shadow_BAL)"/>

      <!-- Protocol text/symbol -->
      <text x="64" y="83.2"
            font-family="Arial, sans-serif"
            font-size="51.2"
            font-weight="bold"
            fill="white"
            text-anchor="middle">
        B
      </text>

      <!-- Inner ring for visual appeal -->
      <circle cx="64" cy="64" r="60"
              fill="none"
              stroke="rgba(255,255,255,0.2)"
              stroke-width="1"/>
    </svg>